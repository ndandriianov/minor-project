# Production setup: nginx (TLS via Caddy) + backend + frontend + postgres
# Запуск:
#   1. Скопируй .env.example в .env и заполни (DOMAIN, JWT_SECRET, DONATIONALERTS_*, и т.д.)
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. Caddy сам получит Let's Encrypt сертификат при первом запросе

services:
  postgres:
    image: postgres:16-alpine
    container_name: prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-internships}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: prod-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-internships}
      ALLOW_MOCK_PAYMENTS: "0"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "5051"

  frontend:
    build:
      context: ./frontend
    container_name: prod-frontend
    restart: unless-stopped
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    container_name: prod-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN required, e.g. myapp.ru}
      EMAIL: ${ACME_EMAIL:?ACME_EMAIL required for Let's Encrypt}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  backend_uploads:
  caddy_data:
  caddy_config:
